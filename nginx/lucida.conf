# /etc/nginx/sites-available/lucida.conf
# Run on host (Ubuntu) — proxies lucida.hbinserver.cloud to docker containers
# bound to 127.0.0.1:3010 (frontend) and 127.0.0.1:8010 (backend).
# Ports chosen to avoid collisions with co-tenant services on this host
# (trnt-frontend uses :3000, jeonnam-tourism-app uses :8000).
#
# Setup (one-time):
#   sudo cp nginx/lucida.conf /etc/nginx/sites-available/lucida.conf
#   sudo ln -s /etc/nginx/sites-available/lucida.conf /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d lucida.hbinserver.cloud
# Certbot will auto-edit this file to add the :443 server block + SSL cert paths.

# ──────────────────────────────────────────────────────────────────
# Rate-limit zones — defined at http{} scope. If your nginx already
# has a global limit_req_zone elsewhere, move these to /etc/nginx/conf.d
# and remove from here. They live in the server block context fine on
# Ubuntu's default split.
# ──────────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=lucida_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=lucida_explain:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name lucida.hbinserver.cloud;

    # Force HTTPS — even on a fresh deploy before certbot has run, do not
    # serve plain-text content. Certbot will re-write this block once SSL
    # is configured.
    return 301 https://$host$request_uri;
}

server {
    # Certbot will swap this to listen 443 ssl after running:
    #   sudo certbot --nginx -d lucida.hbinserver.cloud
    listen 80;
    listen [::]:80;
    server_name lucida.hbinserver.cloud;

    # ── Security headers (always) ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://rsms.me; \
         font-src 'self' https://fonts.gstatic.com https://rsms.me; \
         img-src 'self' data:; \
         connect-src 'self'; \
         frame-ancestors 'self'; \
         base-uri 'self'; \
         form-action 'self'"
        always;

    client_max_body_size 1m;

    # ── /api/ — FastAPI backend ───────────────────────────────────
    location /api/ {
        # Heavier limit on /api/explain (N+1 RF predictions); general
        # limit on the rest. Nginx applies the most-specific match first.
        limit_req zone=lucida_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /api/explain {
        limit_req zone=lucida_explain burst=4 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Everything else — Next.js ─────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
