# /etc/nginx/sites-available/lucida.conf
# Internal gateway behind a Cloudflare Tunnel.
#
# External traffic flow:
#   client  ─[HTTPS]─►  Cloudflare edge  ─[tunnel]─►  cloudflared on this host
#                     ─[HTTP, loopback]─►  this nginx (127.0.0.1:8088)
#                     ─►  127.0.0.1:3010  (lucida-frontend, Next.js)
#                     ─►  127.0.0.1:8010  (lucida-backend, FastAPI uvicorn)
#
# - SSL is terminated at Cloudflare (Universal SSL).  No certbot needed here.
# - DNS / HTTPS-redirect / HTTP/2 are all handled by Cloudflare.
# - This server block listens ONLY on the loopback interface so the 8088
#   port is never reachable from the public internet — only from
#   `cloudflared` running on the same host.
#
# Cloudflare Tunnel route to register (in Zero Trust dashboard):
#   Subdomain : lucida
#   Domain    : hbinserver.cloud
#   Type      : HTTP
#   URL       : localhost:8088

# ── Rate-limit zones (http context, picked up via sites-enabled include) ──
limit_req_zone $binary_remote_addr zone=lucida_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=lucida_explain:10m rate=10r/m;

# Trust Cloudflare's CF-Connecting-IP header for real client IPs.
# (Optional but useful for accurate rate-limit and logs.)
real_ip_header CF-Connecting-IP;
# Cloudflare IP ranges as of 2024–2026.  Keep up to date:
#   https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 127.0.0.1;

server {
    listen 127.0.0.1:8088;
    server_name lucida.hbinserver.cloud _;

    # ── Security headers (added on top of whatever Cloudflare adds) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://rsms.me; \
         font-src 'self' https://fonts.gstatic.com https://rsms.me; \
         img-src 'self' data:; \
         connect-src 'self'; \
         frame-ancestors 'self'; \
         base-uri 'self'; \
         form-action 'self'"
        always;

    client_max_body_size 1m;

    # ── /api/explain — heavier rate limit (N+1 RF predictions) ──
    location = /api/explain {
        limit_req zone=lucida_explain burst=4 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # ── /api/* — backend ──
    location /api/ {
        limit_req zone=lucida_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # ── Everything else — Next.js ──
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
