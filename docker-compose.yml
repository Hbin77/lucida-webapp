services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lucida-backend
    restart: unless-stopped
    environment:
      # Comma-separated list of allowed CORS origins. With same-origin
      # nginx in front, this is rarely needed at runtime; localhost is
      # included so local docker-compose dev still works.
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://lucida.hbinserver.cloud}
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8010:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lucida-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3010:3000"
    depends_on:
      backend:
        condition: service_started
